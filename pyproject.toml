[tool.black]
line-length = 100
target-version = ["py311"]
extend-exclude = "^(old/|build/|dist/|venv/|\\.venv/)"

[tool.isort]
profile = "black"
line_length = 100
skip_glob = ["old/*", "build/*", "dist/*", "venv/*", ".venv/*"]

[tool.flake8]
max-line-length = 100
extend-ignore = ["E203", "W503"]
exclude = [
    ".git",
    "__pycache__",
    "old",
    "build",
    "dist",
    "venv",
    ".venv",
]
